<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>《卅一景》- 极简大气菜单测试 (保留背景图版)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* 新的极简调色盘 */
      --color-text-main: #1A1512; /* 焦墨 / 玄黑 */
      --color-text-sub: #82776B;  /* 沉灰 / 茶褐 */
      --color-accent-red: #BC3023;/* 纯正朱砂 */
      --color-accent-blue: #465D68;/* 远山黛 */
      
      --font-serif: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
      --font-handwrite: 'LXGW WenKai', 'KaiTi', 'STKaiti', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-serif);
      color: var(--color-text-main);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ===========================
       背景与滤镜 (保留原图)
       =========================== */
    .menu-scene {
      width: 100vw;
      min-height: 100vh;
      background-color: #F9F6F0; /* 缟素底色防透 */
      position: absolute;
      top: 0; left: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-scene::before {
      content: '';
      position: absolute;
      inset: -5%;
      background-image: url("/images/menu-test-bg.png");
      background-size: cover;
      background-position: center;
      /* 微调滤镜：保留原背景氛围，但稍微降低干扰 */
      filter: grayscale(0.7) brightness(1.1) contrast(0.95);
      pointer-events: none;
      z-index: 0;
    }

    /* 模拟主面板容器 */
    .menu-panel {
      position: relative;
      z-index: 10;
      width: 800px;
      max-width: calc(100vw - 2rem);
      display: flex;
      flex-direction: column;
    }

    /* ===========================
       主面板 (保留毛玻璃，调整底色)
       =========================== */
    .menu-content {
      background: rgba(249, 246, 240, 0.75); /* 透出淡淡的缟素色，比原版更白净 */
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      /* 暖黑色的弥散阴影，更高级 */
      box-shadow: 0 16px 50px rgba(26, 21, 18, 0.08); 
      border-radius: 20px;
      padding: 3rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ===========================
       头部 (高对比，大间距)
       =========================== */
    .menu-header {
      text-align: center;
      position: relative;
    }

    .menu-header-ink {
      position: absolute;
      top: -0.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: var(--color-text-main);
      opacity: 0.15;
    }

    .menu-title {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      margin-left: 0.25em;
      margin-bottom: 0.5rem;
      color: var(--color-text-main);
    }

    .menu-subtitle {
      font-family: var(--font-handwrite);
      font-size: 0.95rem;
      color: var(--color-text-sub);
      letter-spacing: 0.2em;
      margin-bottom: 1.5rem;
    }

    /* 极简进度条 */
    .menu-progress {
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: center;
    }

    .progress-track {
      width: 120px;
      height: 2px;
      background: rgba(0, 0, 0, 0.06);
      position: relative;
    }

    .progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--color-accent-blue);
      border-radius: 2px;
    }

    .progress-text {
      font-family: var(--font-handwrite);
      font-size: 0.8rem;
      color: var(--color-accent-blue);
      letter-spacing: 0.1em;
    }

    /* ===========================
       章节列表 (去边框，悬浮交互)
       =========================== */
    .chapter-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .chapter-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .chapter-item--unlocked {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid transparent;
    }

    .chapter-item--unlocked:hover {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(255, 255, 255, 1);
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(26, 21, 18, 0.05);
    }

    .chapter-item--locked {
      cursor: not-allowed;
      opacity: 0.5;
      background: transparent;
      border-color: transparent;
    }

    /* 标记位 */
    .chapter-marker {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
    }

    .chapter-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-handwrite);
      font-size: 0.8rem;
      color: var(--color-accent-blue);
      border: 1px solid rgba(70, 93, 104, 0.2);
      letter-spacing: 0.05em;
    }

    .chapter-num--dim {
      color: var(--color-text-sub);
      border-color: rgba(130, 119, 107, 0.15);
    }

    /* 纯正哑光朱砂印章 */
    .seal {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 0.75rem;
      color: #F9F6F0;
      background: var(--color-accent-red);
      border-radius: 2px;
      letter-spacing: 0.1em;
      transform: rotate(-4deg);
      box-shadow: inset 0 0 4px rgba(0,0,0,0.1);
    }

    /* 章节信息 */
    .chapter-info { width: 100%; position: relative; z-index: 1; }
    .chapter-header { margin-bottom: 0.3rem; }
    
    .chapter-name {
      display: block;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--color-text-main);
      letter-spacing: 0.08em;
      margin-bottom: 0.2rem;
    }

    .chapter-subtitle {
      display: block;
      font-family: var(--font-handwrite);
      font-size: 0.9rem;
      color: var(--color-text-main);
      opacity: 0.85;
      letter-spacing: 0.05em;
    }

    .chapter-tagline {
      font-family: var(--font-handwrite);
      font-size: 0.85rem;
      color: var(--color-text-sub);
      line-height: 1.6;
      margin-top: 0.8rem;
      letter-spacing: 0.03em;
    }

    .chapter-item--unlocked:hover .chapter-tagline {
      color: var(--color-text-main);
    }

    /* 状态图标 */
    .chapter-lock-icon,
    .chapter-arrow {
      position: absolute;
      bottom: 1.2rem;
      right: 1.2rem;
      transition: all 0.3s ease;
    }

    .chapter-lock-icon {
      color: rgba(26, 21, 18, 0.25);
    }
    .chapter-arrow {
      color: rgba(26, 21, 18, 0.3);
    }

    .chapter-item--unlocked:hover .chapter-arrow {
      color: rgba(26, 21, 18, 0.85);
      transform: translateX(4px);
    }

  </style>
</head>
<body>

  <div class="menu-scene">
    <div class="menu-panel">
      <div class="menu-content">
        <!-- 头部 -->
        <header class="menu-header">
          <div class="menu-header-ink"></div>
          <h1 class="menu-title">卅一景</h1>
          <p class="menu-subtitle">选择你要进入的章节</p>
          <div class="menu-progress">
            <div class="progress-track">
              <div class="progress-fill" style="width: 40%"></div>
            </div>
            <span class="progress-text">2 / 5</span>
          </div>
        </header>

        <!-- 列表 -->
        <nav class="chapter-list">
          
          <!-- 已完成章节 -->
          <div class="chapter-item chapter-item--unlocked">
            <div class="chapter-marker">
              <div class="seal">已阅</div>
            </div>
            <div class="chapter-info">
              <div class="chapter-header">
                <span class="chapter-name">序章</span>
                <span class="chapter-subtitle">残页</span>
              </div>
              <p class="chapter-tagline">一次例行的修复工作，揭开了五百年前的秘密</p>
            </div>
            <div class="chapter-arrow">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <!-- 已解锁章节 -->
          <div class="chapter-item chapter-item--unlocked">
            <div class="chapter-marker">
              <div class="chapter-num">01</div>
            </div>
            <div class="chapter-info">
              <div class="chapter-header">
                <span class="chapter-name">第一章</span>
                <span class="chapter-subtitle">东园 · 兰雪堂至芙蓉榭</span>
              </div>
              <p class="chapter-tagline">水面之下，另一个世界在等待</p>
            </div>
            <div class="chapter-arrow">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <!-- 未解锁章节 -->
          <div class="chapter-item chapter-item--locked">
            <div class="chapter-marker">
              <div class="chapter-num chapter-num--dim">02</div>
            </div>
            <div class="chapter-info">
              <div class="chapter-header">
                <span class="chapter-name">第二章</span>
                <span class="chapter-subtitle">中园 · 远香堂至小飞虹</span>
              </div>
              <p class="chapter-tagline">诗句之间，隐藏着不被允许的笔迹</p>
            </div>
            <div class="chapter-lock-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M5 7V5C5 3.34315 6.34315 2 8 2C9.65685 2 11 3.34315 11 5V7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <!-- 未解锁章节 -->
          <div class="chapter-item chapter-item--locked">
            <div class="chapter-marker">
              <div class="chapter-num chapter-num--dim">03</div>
            </div>
            <div class="chapter-info">
              <div class="chapter-header">
                <span class="chapter-name">第三章</span>
                <span class="chapter-subtitle">西园 · 卅六鸳鸯馆至留听阁</span>
              </div>
              <p class="chapter-tagline">画壁深处，真相在剥落中浮现</p>
            </div>
            <div class="chapter-lock-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M5 7V5C5 3.34315 6.34315 2 8 2C9.65685 2 11 3.34315 11 5V7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

        </nav>
      </div>
    </div>
  </div>

</body>
</html>
